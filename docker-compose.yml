version: '3.8'
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: succession_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/succession_db
      JWT_SECRET: super-secret-jwt-key-change-in-production
      PORT: 5000
      CLIENT_URL: http://localhost:5173
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "npx prisma migrate deploy && node prisma/seed.js && node src/index.js"

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - server

volumes:
  postgres_data:
